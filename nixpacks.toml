[phases.setup]
nixPkgs = ["python3", "nodejs_20"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd frontend && npm ci --prefer-offline"
]

[phases.build]
cmds = [
    "cd frontend && NODE_OPTIONS='--max-old-space-size=1536' npm run build"
]

[start]
cmd = "uvicorn api:app --host 0.0.0.0 --port $PORT"
